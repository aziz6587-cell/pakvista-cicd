# ============================================================
# ci-prod.yml - CI Pipeline for Production Environment
# University of Central Punjab | DevOps Fundamentals Spring 2026
# Authored by: Member 5
#
# Trigger : pull_request targeting the 'main' branch
# Purpose : Lint HTML & CSS, build with Parcel, build and push
#           a Docker image tagged :prod-latest and :prod-<sha>
# ============================================================

name: CI - Production

on:
  pull_request:
    branches:
      - main

jobs:
  ci-prod:
    name: Lint, Build & Push (Production)
    runs-on: ubuntu-latest

    steps:
      # -- Step 1: Checkout ----------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -- Step 2: Lint HTML & CSS, Build with Parcel ----------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install linting & build tools
        run: |
          npm install --save-dev \
            htmlhint \
            stylelint \
            stylelint-config-standard \
            parcel

      - name: Create HTMLHint config
        run: |
          cat > .htmlhintrc << 'EOF'
          {
            "doctype-first": true,
            "head-script-disabled": true,
            "alt-require": true,
            "id-unique": true,
            "src-not-empty": true,
            "title-require": true
          }
          EOF

      - name: Create Stylelint config
        run: |
          cat > .stylelintrc.json << 'EOF'
          {
            "extends": ["stylelint-config-standard"],
            "rules": {
              "color-no-invalid-hex": true,
              "no-duplicate-selectors": true,
              "color-hex-length": null,
              "color-function-notation": null,
              "color-function-alias-notation": null,
              "alpha-value-notation": null,
              "value-keyword-case": null,
              "custom-property-empty-line-before": null,
              "declaration-block-single-line-max-declarations": null,
              "no-descending-specificity": null,
              "media-feature-range-notation": null,
              "rule-empty-line-before": null,
              "comment-empty-line-before": null,
              "declaration-empty-line-before": null
            }
          }
          EOF

      - name: Lint HTML files
        run: npx htmlhint "*.html"

      - name: Lint CSS file
        run: npx stylelint "style.css"

      - name: Build static site with Parcel
        run: |
          npx parcel build *.html \
            --dist-dir dist \
            --no-source-maps \
            --no-optimize \
            --public-url ./
        continue-on-error: false

      # -- Step 3: Docker Login ----------
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -- Step 4 & 5: Build Image with prod-specific tags ----------
      - name: Build Docker image (prod tags)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:prod-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:prod-${{ github.sha }}

      # -- Step 6: Push Image to Docker Hub ----------
      - name: Push Docker image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:prod-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:prod-${{ github.sha }}
