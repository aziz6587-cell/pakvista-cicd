# ============================================================
# cd-dev.yml - CD Pipeline for Development Environment
# University of Central Punjab | DevOps Fundamentals Spring 2026
# Authored by: Member 2
#
# Trigger : push to the 'develop' branch (i.e. after PR merge)
# Purpose : Trigger a deployment on the pakvista-dev Render
#           service using its deploy hook URL.
# ============================================================

name: CD - Development

on:
  push:
    branches:
      - develop

jobs:
  cd-dev:
    name: Deploy to Render (Development)
    runs-on: ubuntu-latest

    # Declare the GitHub Environment so the environment-level
    # secret RENDER_DEPLOY_HOOK_DEV_URL is injected into this job.
    environment: development

    steps:
      # -- Step 1: Checkout ----------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -- Step 2: Environment is declared above (job-level) ---
      # The 'environment: development' key above tells GitHub
      # Actions to load secrets from the 'development' environment,
      # including RENDER_DEPLOY_HOOK_DEV_URL.

      # -- Step 3: Deploy via Render Deploy Hook ----------
      - name: Trigger deployment on Render (Development)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_DEV_URL }}"

      # -- Step 4: Confirm deployment ----------
      - name: Confirm deployment
        run: |
          echo "Deployment to development triggered at $(date)"
